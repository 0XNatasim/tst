services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: openquebec
      POSTGRES_USER: openquebec
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://openquebec:${DB_PASSWORD:-devpassword}@db:5432/openquebec
      PORT: "4000"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    environment:
      DATABASE_URL: postgres://openquebec:${DB_PASSWORD:-devpassword}@db:5432/openquebec
    depends_on:
      - db

volumes:
  pgdata:
